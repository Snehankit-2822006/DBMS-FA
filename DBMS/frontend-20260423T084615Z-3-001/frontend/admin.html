<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | EventBook</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-layout {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }
        .sidebar {
            width: 250px;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            height: fit-content;
        }
        .sidebar button {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            padding: 1rem;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }
        .sidebar button:hover, .sidebar button.active {
            background: rgba(255,255,255,0.05);
            color: var(--accent);
            font-weight: bold;
        }
        .main-content {
            flex: 1;
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            color: var(--accent);
        }
        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div id="loginOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <h1 style="color: var(--accent); margin-bottom: 2rem;">Admin Authentication</h1>
        <form onsubmit="adminLogin(event)" style="background: var(--bg-card); padding: 2.5rem; border-radius: 12px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div class="form-group">
                <label>Administrator Username</label>
                <input type="text" id="adminUser" required placeholder="admin">
            </div>
            <div class="form-group">
                <label>Master Password</label>
                <input type="password" id="adminPass" required placeholder="admin123">
            </div>
            <button type="submit" class="btn">Access Dashboard</button>
            <p id="loginError" style="color: var(--danger); margin-top: 1rem; text-align: center; font-weight: bold;"></p>
        </form>
        <a href="index.html" style="color: var(--text-muted); margin-top: 2rem;">&larr; Return to Home</a>
    </div>

    <div id="adminApp" style="display: none;">
        <nav>
            <a href="index.html" class="logo">EventBook System</a>
            <div class="nav-links">
                <button onclick="adminLogout()" style="background: none; border: none; color: #f87171; cursor: pointer; font-size: 1rem; margin-right: 15px;">Logout</button>
                <a href="index.html" style="color: white; text-decoration: none;">Exit Admin</a>
            </div>
        </nav>
        <div class="container admin-layout">
        <aside class="sidebar">
            <button class="active" onclick="switchTab('events')">🗓️ Manage Events</button>
            <button onclick="switchTab('bookings')">🎟️ View Bookings</button>
        </aside>
        
        <main class="main-content">
            <!-- Manage Events Tab -->
            <div id="events" class="tab-content active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Manage Events</h2>
                    <button class="btn btn-small" onclick="document.getElementById('addEventForm').style.display='block'">+ Add New Event</button>
                </div>
                
                <!-- Add Event Form -->
                <div id="addEventForm" style="display: none; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
                    <form onsubmit="addEvent(event)">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="evTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Date & Time</label>
                            <input type="datetime-local" id="evDate" required>
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="evLocation" required>
                        </div>
                        <div class="form-group">
                            <label>Event Image (Upload from Computer)</label>
                            <input type="file" id="evImage" accept="image/*" style="padding: 1rem; background: rgba(0,0,0,0.2); border: 2px dashed var(--accent); cursor: pointer; color: var(--accent); width: 100%;">
                        </div>
                        <div class="form-group">
                            <label>Total Seats (Auto-generates seat grid)</label>
                            <input type="number" id="evSeats" required min="1" max="1000" placeholder="50">
                        </div>
                        <button type="submit" class="btn">Create Event</button>
                        <button type="button" class="btn btn-danger" style="margin-left: 1rem;" onclick="document.getElementById('addEventForm').style.display='none'">Cancel</button>
                    </form>
                </div>

                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Location</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-events-list">
                            <!-- Events populated here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- View Bookings Tab -->
            <div id="bookings" class="tab-content">
                <h2>All System Bookings</h2>
                <div style="overflow-x: auto; margin-top: 1rem;">
                    <table>
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>User Name</th>
                                <th>Email</th>
                                <th>Event</th>
                                <th>Seat No.</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Method</th>
                                <th>Booking Time</th>
                            </tr>
                        </thead>

                        <tbody id="admin-bookings-list">
                            <!-- Bookings populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div> <!-- End Admin App -->
    
    <script src="admin.js"></script>
</body>
</html>
